events {}

http {
  log_format api_security '$remote_addr "$request" $status $body_bytes_sent '
                          '"$http_user_agent" "$http_x_request_id"';
  access_log /var/log/nginx/access.log api_security;

  limit_req_zone $binary_remote_addr zone=secure_api:10m rate=5r/s;

  upstream auth_service { server auth-service:3001; }
  upstream user_service { server user-service:3002; }
  upstream product_service { server product-service:3003; }
  upstream order_service { server order-service:3004; }
  upstream payment_service { server payment-service:3005; }

  server {
    listen 80;
    client_max_body_size 128k;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Request-Id $request_id;

    location /health {
      return 200 '{"gateway":"ok"}';
      add_header Content-Type application/json;
    }

    location ~ ^/secure/auth/ {
      limit_req zone=secure_api burst=20 nodelay;
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_pass http://auth_service;
    }

    location ~ ^/secure/users/ {
      limit_req zone=secure_api burst=20 nodelay;
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_pass http://user_service;
    }

    location ~ ^/secure/products/ {
      limit_req zone=secure_api burst=20 nodelay;
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_pass http://product_service;
    }

    location ~ ^/secure/orders/ {
      limit_req zone=secure_api burst=20 nodelay;
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_pass http://order_service;
    }

    location ~ ^/secure/payments/ {
      limit_req zone=secure_api burst=20 nodelay;
      proxy_connect_timeout 2s;
      proxy_send_timeout 5s;
      proxy_read_timeout 5s;
      proxy_pass http://payment_service;
    }

    location ~ ^/vulnerable/auth/ { proxy_pass http://auth_service; }
    location ~ ^/vulnerable/users/ { proxy_pass http://user_service; }
    location ~ ^/vulnerable/products/ { proxy_pass http://product_service; }
    location ~ ^/vulnerable/orders/ { proxy_pass http://order_service; }
    location ~ ^/vulnerable/payments/ { proxy_pass http://payment_service; }
  }
}
